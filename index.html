<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小红书📕Lexar🇦🇷助威贴小助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui
        }

        body {
            /* 阿根廷浅蓝渐变背景 */
            background: linear-gradient(160deg, #e6f0fa 0%, #d0e3f7 100%);
            padding: 16px;
            min-height: 100vh;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            /* 蓝调柔和阴影 */
            box-shadow: 0 4px 16px rgba(0, 82, 165, 0.12);
            /* 阿根廷浅蓝细边框 */
            border: 1px solid #74ACDF;
            transition: transform 0.25s ease;
        }

        .card:active {
            transform: translateY(-2px);
        }

        .label {
            font-size: 17px;
            font-weight: bold;
            margin-bottom: 12px;
            /* 阿根廷深蓝标题 */
            color: #0052A5;
            letter-spacing: 0.5px;
        }

        .text-area {
            white-space: pre-wrap;
            /* 蓝白渐变边框 */
            border: 1px solid #74ACDF;
            border-radius: 10px;
            padding: 14px;
            line-height: 1.75;
            margin-bottom: 14px;
            user-select: none;
            -webkit-user-select: none;
            cursor: default;
            /* 极浅蓝底色呼应主题 */
            background-color: #f7fbff;
            color: #1a1a1a;
            font-size: 14px;
        }

        .copy-btn {
            /* 阿根廷天蓝色主按钮 */
            background: #74ACDF;
            color: #ffffff;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(116, 172, 223, 0.35);
        }

        .copy-btn:active {
            background: #0052A5;
            transform: scale(0.96);
            box-shadow: 0 1px 4px rgba(0, 82, 165, 0.3);
        }

        .tip {
            color: #0052A5;
            margin-top: 12px;
            font-weight: 500;
            display: none;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="label">标题</div>
        <div id="titleContent" class="text-area">
雷克沙陪我们看球！🇦🇷阿根廷球迷线下观赛太燃了⚽
        </div>
        <button class="copy-btn" onclick="copyTitle()">复制标题</button>
        <div id="tipTitle" class="tip">✅ 标题已复制，去小红书📕粘贴吧</div>
    </div>

    <div class="card">
        <div class="label">文案</div>
        <div id="descContent" class="text-area">
蓝白信仰集结，全场一起为🇦🇷阿根廷呐喊！
雷克沙存储，🏆冠军之选，用存储留住每一个热血瞬间。
阿根廷🇦🇷加油，全力冲胜！
@Lexar雷克沙 #雷克沙 #雷克沙嘉年华
        </div>
        <button class="copy-btn" onclick="copyDesc()">复制文案</button>
        <div id="tipDesc" class="tip">✅ 文案已复制，去小红书📕粘贴吧</div>
    </div>

    <script>
        function copyText(text, tipId) {
            const tipDom = document.getElementById(tipId);

            // 防止重复点击
            if (tipDom.classList.contains('showing')) {
                return;
            }

            // 微信兼容复制逻辑
            const tempInput = document.createElement('textarea');
            tempInput.value = text;
            tempInput.style.position = 'fixed';
            tempInput.style.left = '-9999px';
            tempInput.style.top = '-9999px';
            document.body.appendChild(tempInput);
            tempInput.select();

            try {
                // 尝试两种复制方式确保兼容性
                const copySuccess = document.execCommand('copy');
                if (!copySuccess) {
                    throw new Error('execCommand failed');
                }
            } catch (err) {
                // execCommand失败时使用clipboard API
                navigator.clipboard.writeText(text).catch(() => { });
            }

            document.body.removeChild(tempInput);

            // 方法1：使用class
            tipDom.classList.add('showing');

            // 方法2：同时设置style确保显示
            tipDom.style.display = 'block';
            tipDom.style.visibility = 'visible';
            tipDom.style.opacity = '1';

            // 添加一些日志便于调试
            console.log('复制成功，显示提示');

            // 2秒后隐藏
            setTimeout(function () {
                tipDom.classList.remove('showing');
                tipDom.style.display = 'none';
                tipDom.style.visibility = 'hidden';
                tipDom.style.opacity = '0';
                console.log('隐藏提示');
            }, 2000);
        }

        function copyTitle() {
            let text = document.getElementById("titleContent").innerText.trim();
            copyText(text, 'tipTitle');
        }
        function copyDesc() {
            let text = document.getElementById("descContent").innerText.trim();
            copyText(text, 'tipDesc');
        }
    </script>
</body>

</html>
